version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: tung-tung-db
    environment:
      POSTGRES_USER: tung-tung
      POSTGRES_PASSWORD: tung-tung
      POSTGRES_DB: tung-tung
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tung-tung-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
